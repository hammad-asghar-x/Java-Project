<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">Stress Tracker</h1>
        <div class="flex items-center gap-4">
            <span class="text-slate-600" th:text="${studentName}">Student Name</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-sm text-slate-600 hover:text-rose-500 font-semibold">Logout</button>
            </form>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6 mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Left Column: Entry Form -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
            <h2 class="text-lg font-semibold mb-4">Log Today's Entry</h2>
            
            <div th:if="${successMessage}" class="bg-emerald-100 text-emerald-700 p-3 rounded-lg mb-4 text-sm" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="bg-rose-100 text-rose-700 p-3 rounded-lg mb-4 text-sm" th:text="${errorMessage}"></div>

            <form th:action="@{/student/entry}" method="post" class="space-y-5">
                <!-- Mood Slider -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Mood (1-10)</label>
                    <input type="range" name="mood" min="1" max="10" value="5" class="w-full accent-blue-600" oninput="this.nextElementSibling.textContent = this.value">
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>1 (Low)</span><span class="font-bold text-blue-600">5</span><span>10 (High)</span>
                    </div>
                </div>

                <!-- Stress Slider -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Stress Level (1-10)</label>
                    <input type="range" name="stress" min="1" max="10" value="5" class="w-full accent-rose-500" oninput="this.nextElementSibling.textContent = this.value">
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>1 (Calm)</span><span class="font-bold text-rose-600">5</span><span>10 (Overwhelmed)</span>
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Optional Notes</label>
                    <textarea name="notes" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="How are you feeling today?"></textarea>
                </div>

                <!-- Anonymous Toggle -->
                <div class="flex items-center justify-between">
                    <label class="text-sm font-medium text-slate-700">Mark as Anonymous</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="isAnonymous" value="true" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">Save Entry</button>
            </form>
        </div>

        <!-- Right Column: Insights -->
        <div class="space-y-6">
            
            <!-- Weekly Trends Chart -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">Weekly Trends</h2>
                <div class="h-64">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <!-- Recent Entries -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">Recent Entries</h2>
                <div class="space-y-3 max-h-64 overflow-y-auto pr-2">
                    <div th:if="${#lists.isEmpty(recentEntries)}" class="text-slate-500 text-sm text-center py-4">
                        No entries yet. Log your first entry!
                    </div>
                    
                    <div th:each="entry : ${recentEntries}" class="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                        <div>
                            <p class="text-sm font-medium text-slate-800" th:text="${#temporals.format(entry.date, 'MMM dd, yyyy')}">Date</p>
                            <p class="text-xs text-slate-500 truncate max-w-[200px]" th:text="${entry.notes != null ? entry.notes : 'No notes'}">Notes</p>
                        </div>
                        <div class="flex gap-2">
                            <span class="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800" th:text="'Mood: ' + ${entry.mood}">Mood</span>
                            <span th:classappend="${entry.stress > 7} ? 'bg-rose-100 text-rose-800' : 'bg-emerald-100 text-emerald-800'" 
                                  class="px-2 py-1 text-xs font-semibold rounded-full" 
                                  th:text="'Stress: ' + ${entry.stress}">Stress</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Chart Configuration -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Safely get data from Thymeleaf with fallback to empty arrays
        const datesData = /*[[${dates}]]*/ [];
        const moodsData = /*[[${moods}]]*/ [];
        const stressesData = /*[[${stresses}]]*/ [];
        
        // Ensure data is properly formatted as arrays
        const dates = Array.isArray(datesData) ? datesData : [];
        const moods = Array.isArray(moodsData) ? moodsData : [];
        const stresses = Array.isArray(stressesData) ? stressesData : [];

        // Only create chart if we have data
        if (dates.length > 0 && moods.length > 0 && stresses.length > 0) {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: 'Mood',
                            data: moods,
                            borderColor: '#2563EB', // Blue-600
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Stress',
                            data: stresses,
                            borderColor: '#F43F5E', // Rose-500
                            backgroundColor: 'rgba(244, 63, 94, 0.1)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 10,
                            title: { display: true, text: 'Score (1-10)' }
                        }
                    },
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        } else {
            // Show message if no data
            const chartContainer = document.querySelector('#weeklyChart').parentElement;
            chartContainer.innerHTML += '<p class="text-slate-500 text-sm text-center py-8">No data available. Log entries for the past week to see trends.</p>';
        }
        /*]]>*/
    </script>
</body>
</html>
