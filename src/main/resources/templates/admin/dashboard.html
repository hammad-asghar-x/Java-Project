<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">Admin Panel</h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-slate-600 hover:text-rose-500 font-semibold">Logout</button>
        </form>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-8 space-y-8">
        
        <!-- Feedback Messages -->
        <div th:if="${successMessage}" class="bg-emerald-100 text-emerald-700 p-3 rounded-lg text-sm" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="bg-rose-100 text-rose-700 p-3 rounded-lg text-sm" th:text="${errorMessage}"></div>

        <!-- 1. Add New Counselor Form -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Add New Counselor</h2>
            <form th:action="@{/admin/counselors/add}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" name="name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Temporary Password</label>
                    <input type="password" name="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors font-semibold">
                        Add Counselor
                    </button>
                </div>
            </form>
        </div>

        <!-- 2. Manage Counselors List -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Manage Counselors</h2>
            
            <div class="overflow-hidden rounded-lg border border-slate-200">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-slate-600">Name</th>
                            <th class="p-4 text-sm font-semibold text-slate-600">Email</th>
                            <th class="p-4 text-sm font-semibold text-slate-600 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="counselor : ${counselors}" class="hover:bg-slate-50 transition">
                            <td class="p-4 font-medium text-slate-800" th:text="${counselor.name}">Name</td>
                            <td class="p-4 text-slate-600" th:text="${counselor.email}">Email</td>
                            <td class="p-4 text-right">
                                <form th:action="@{/admin/counselors/{id}/remove(id=${counselor.id})}" method="post" class="inline" onsubmit="return confirm('Are you sure you want to remove this counselor?');">
                                    <button type="submit" class="bg-rose-500 text-white px-3 py-1.5 rounded-lg hover:bg-rose-600 transition-colors text-sm font-semibold">
                                        Remove
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${counselors.isEmpty()}">
                            <td colspan="3" class="p-6 text-center text-slate-500">No counselors found. Add one above.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</body>
</html>
