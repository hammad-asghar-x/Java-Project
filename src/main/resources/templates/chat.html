<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSRF Token for Spring Security -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  </head>
  <body class="bg-slate-50 font-sans text-slate-800 h-screen flex flex-col">
    <!-- Top Navbar -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
      <div class="flex items-center gap-3">
        <a
          th:href="${currentUser.role.name() == 'STUDENT'} ? @{/student/dashboard} : @{/counselor/dashboard}"
          class="text-slate-500 hover:text-blue-600"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
        </a>
        <div>
          <h1 class="text-lg font-bold text-blue-600">Secure Chat</h1>
          <p class="text-xs text-slate-500">
            Chatting with
            <span
              class="font-semibold text-slate-800"
              th:text="${otherUser.name}"
              >User</span
            >
          </p>
        </div>
      </div>
      <form th:action="@{/logout}" method="post">
        <button
          type="submit"
          class="text-sm text-slate-600 hover:text-rose-500 font-semibold"
        >
          Logout
        </button>
      </form>
    </nav>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-container">
      <div class="text-center text-slate-400 text-sm mt-10">
        Loading messages...
      </div>
    </main>

    <!-- Input Area -->
    <div class="bg-white p-4 border-t border-slate-200">
      <form id="chat-form" class="flex gap-2">
        <input
          type="text"
          id="message-input"
          autocomplete="off"
          placeholder="Type a supportive message..."
          required
          class="flex-1 border border-slate-300 rounded-full px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
        <button
          type="submit"
          class="bg-blue-600 text-white rounded-full px-6 py-2 hover:bg-blue-700 transition font-semibold"
        >
          Send
        </button>
      </form>
    </div>

    <script th:inline="javascript">
      /*<![CDATA[*/
      // DEBUG: Log the values to console
      const currentUserId = /*[[${currentUser.id}]]*/ 0;
      const otherUserId = /*[[${otherUser.id}]]*/ 0;

      console.log("Current User ID:", currentUserId);
      console.log("Other User ID:", otherUserId);
      console.log("Current User:", /*[[${currentUser}]]*/ {});
      console.log("Other User:", /*[[${otherUser}]]*/ {});

      const csrfToken = document
        .querySelector('meta[name="_csrf"]')
        .getAttribute("content");
      const csrfHeader = document
        .querySelector('meta[name="_csrf_header"]')
        .getAttribute("content");

      const chatContainer = document.getElementById("chat-container");
      const chatForm = document.getElementById("chat-form");
      const messageInput = document.getElementById("message-input");

      // 1. Fetch Messages (FIXED: Added cache-busting)
      async function fetchMessages() {
        try {
          const url = `/api/chat/messages/${otherUserId}?t=${Date.now()}`;
          console.log("Fetching messages from:", url);

          const response = await fetch(url, {
            cache: "no-store",
          });

          if (response.ok) {
            const messages = await response.json();
            console.log("Fetched messages from server:", messages.length);
            console.log("Messages:", messages);
            renderMessages(messages);
          } else {
            console.error("Failed to fetch messages. Status:", response.status);
          }
        } catch (error) {
          console.error("Error fetching messages:", error);
        }
      }

      // 2. Render Messages to UI
      function renderMessages(messages) {
        chatContainer.innerHTML = "";
        if (messages.length === 0) {
          chatContainer.innerHTML =
            '<div class="text-center text-slate-400 text-sm mt-10">No messages yet. Start the conversation!</div>';
          return;
        }

        messages.forEach((msg) => {
          console.log("Processing message:", msg);
          console.log(
            "msg.sender.id:",
            msg.sender.id,
            "currentUserId:",
            currentUserId,
          );
          console.log("Is this my message?", msg.sender.id === currentUserId);

          const isMe = msg.sender.id === currentUserId;
          const time = new Date(msg.createdAt).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });

          const msgDiv = document.createElement("div");
          msgDiv.className = `flex ${isMe ? "justify-end" : "justify-start"}`;

          msgDiv.innerHTML = `
                <div class="max-w-[75%] rounded-2xl px-4 py-2 shadow-sm ${isMe ? "bg-blue-600 text-white rounded-br-none" : "bg-white text-slate-800 border border-slate-200 rounded-bl-none"}">
                    <p class="text-sm break-words">${msg.content}</p>
                    <p class="text-[10px] mt-1 ${isMe ? "text-blue-100" : "text-slate-400"} text-right">${time}</p>
                </div>
            `;
          chatContainer.appendChild(msgDiv);
        });
        // Auto-scroll to bottom
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      // 3. Send Message
      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const content = messageInput.value.trim();
        if (!content) return;

        console.log("Sending message to user ID:", otherUserId);
        messageInput.value = "";

        const formData = new URLSearchParams();
        formData.append("receiverId", otherUserId);
        formData.append("content", content);

        try {
          const response = await fetch("/api/chat/send", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
              [csrfHeader]: csrfToken,
            },
            body: formData,
          });

          if (response.ok) {
            console.log("Message sent successfully!");
            fetchMessages();
          }
        } catch (error) {
          console.error("Error sending message:", error);
        }
      });

      // 4. Auto-Refresh every 3 seconds
      setInterval(fetchMessages, 3000);

      // Initial load
      fetchMessages();
      /*]]>*/
    </script>
  </body>
</html>
